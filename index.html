@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;900&family=Share+Tech+Mono&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
:root { --c-fg:#000; --c-sub:#333; --c-mute:#666; --c-line:#CCC; --c-bg:#FFF; }
body { width:960px; height:540px; overflow:hidden; background:var(--c-bg); color:var(--c-fg); font-family:'Noto Sans JP',sans-serif; font-weight:700; -webkit-font-smoothing:none; }
.top { display:flex; height:360px; border-bottom:4px solid var(--c-fg); }
.today { flex:0 0 500px; height:360px; border-right:4px solid var(--c-fg); padding:12px 16px 14px; display:flex; flex-direction:column; overflow:hidden; }
.today-date { font-size:44px; font-weight:500; line-height:1; letter-spacing:0.02em; flex-shrink:0; white-space:nowrap; display:flex; flex-wrap:wrap; align-items:baseline; column-gap:14px; row-gap:3px; }
.today-date .d-num { font-size:44px; font-weight:500; color:var(--c-fg); }
.today-date .d-unit { font-size:24px; font-weight:400; color:var(--c-mute); margin:0 2px 0 1px; }
.today-date .d-dow { font-size:38px; font-weight:500; color:var(--c-fg); }
.today-date .d-paren { font-size:24px; font-weight:400; color:var(--c-sub); margin:0 1px; }
.today-date .d-paren:first-of-type { margin-left:4px; }
.today-date .holiday { font-size:24px; font-weight:700; color:var(--c-sub); letter-spacing:0.04em; }
.today-date .fallback-warn { font-size:18px; font-weight:700; color:var(--c-fg); letter-spacing:0; line-height:1.15; white-space:normal; width:100%; }
.today-main { display:flex; align-items:center; justify-content:center; gap:24px; flex:1; min-height:0; }
.today-icon { width:280px; height:190px; flex-shrink:0; }
.jma-icon { filter:grayscale(100%) brightness(0.85) contrast(1.5); }
.jma-icon svg { width:100%; height:100%; display:block; }
.today-desc { font-size:80px; font-weight:900; line-height:1.05; letter-spacing:0.04em; text-align:center; white-space:nowrap; }
.today-desc.long { font-size:80px; line-height:1.05; }
.today-desc.long .sub { display:block; font-size:54px; }
.today-desc.solo { font-size:160px; line-height:1; }
.today-desc.compact { font-size:110px; line-height:1; }
.today-stats { display:flex; align-items:baseline; justify-content:center; gap:6px; padding-top:12px; border-top:2px solid var(--c-line); flex-shrink:0; white-space:nowrap; }
.today-stats .stat-group { display:inline-flex; align-items:baseline; }
.today-stats .label { font-size:18px; font-weight:700; color:var(--c-mute); letter-spacing:0.02em; margin-right:4px; }
.today-stats .num { font-family:'Share Tech Mono',monospace; font-size:60px; line-height:1; color:var(--c-fg); }
.today-stats .unit { font-size:32px; font-weight:700; color:var(--c-fg); margin-left:2px; }
.today-stats .sep { font-size:34px; color:var(--c-line); margin:0 2px; }
.today-stats .umb-wrap { display:inline-flex; align-items:baseline; gap:4px; }
.today-stats .umb-wrap svg { width:40px; height:40px; position:relative; top:8px; }
.garbage { flex:1; height:360px; padding:16px 20px 18px; display:flex; flex-direction:column; gap:14px; overflow:hidden; }

 
.g-today.today-full { background:var(--c-fg); color:var(--c-bg); border-radius:12px; padding:10px 12px; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; gap:4px; flex:1; min-height:0; overflow:hidden; }
.g-today.today-full .g-today-label { font-size:34px; font-weight:700; color:#ddd; letter-spacing:0.06em; }
.g-today.today-full .g-today-name-row { display:flex; align-items:center; justify-content:center; gap:8px; max-width:100%; }
.g-today.today-full .g-today-name { font-size:72px; font-weight:900; line-height:1; letter-spacing:0.02em; color:#fff; white-space:nowrap; }
.g-today.today-full .g-today-name.name-ch5 { font-size:58px; }
.g-today.today-full .g-today-name.name-ch6 { font-size:48px; }
.g-today.today-full .g-today-note { font-size:28px; font-weight:700; color:#999; letter-spacing:0.04em; }

 
.g-today.today-mini { background:var(--c-fg); color:var(--c-bg); border-radius:12px; padding:14px 14px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; flex-shrink:0; overflow:hidden; }
.g-today.today-mini .g-today-label-mini { font-size:22px; font-weight:700; color:#ddd; letter-spacing:0.06em; }
.g-today.today-mini .g-today-name-mini { font-size:36px; font-weight:900; color:#fff; letter-spacing:0.02em; line-height:1; white-space:nowrap; }

 
.next-row { display:flex; gap:10px; flex-shrink:0; }
 
.g-today.today-mini ~ .next-row { flex:1; min-height:0; }
.g-today.today-mini ~ .next-row .g-next { flex:1; }

 
.g-next { flex:1; min-width:0; border:3px solid var(--c-fg); border-radius:12px; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; overflow:hidden; }
.g-next-day { font-weight:700; color:var(--c-mute); letter-spacing:0.06em; }
.g-next-name-row { display:flex; align-items:center; justify-content:center; max-width:100%; }
.g-next-name { font-weight:900; line-height:1; letter-spacing:0.02em; color:var(--c-fg); white-space:nowrap; }
.g-next-note { font-weight:700; color:var(--c-mute); letter-spacing:0.04em; }

 
.g-next.card-1-normal { padding:12px 18px; gap:6px; }
.g-next.card-1-normal .g-next-day { font-size:22px; }
.g-next.card-1-normal .g-next-name-row { gap:10px; }
.g-next.card-1-normal .g-next-name { font-size:44px; }
.g-next.card-1-normal .g-next-name.name-ch5 { font-size:40px; }
.g-next.card-1-normal .g-next-name.name-ch6 { font-size:34px; }
.g-next.card-1-normal .g-next-note { font-size:20px; }

 
.g-next.card-1-enlarged { padding:14px 18px; gap:10px; }
.g-next.card-1-enlarged .g-next-day { font-size:30px; }
.g-next.card-1-enlarged .g-next-name-row { gap:10px; }
.g-next.card-1-enlarged .g-next-name { font-size:66px; }
.g-next.card-1-enlarged .g-next-name.name-ch5 { font-size:52px; }
.g-next.card-1-enlarged .g-next-name.name-ch6 { font-size:44px; }
.g-next.card-1-enlarged .g-next-note { font-size:26px; }

 
.g-next.card-2-normal { padding:8px 8px; gap:4px; }
.g-next.card-2-normal .g-next-day { font-size:18px; }
.g-next.card-2-normal .g-next-name-row { flex-direction:column; gap:4px; }
.g-next.card-2-normal .g-next-name { font-size:38px; }
.g-next.card-2-normal .g-next-name.name-ch5 { font-size:32px; }
.g-next.card-2-normal .g-next-name.name-ch6 { font-size:28px; }
.g-next.card-2-normal .g-next-note { font-size:14px; margin-top:2px; }

 
.g-next.card-2-enlarged { padding:12px 10px; gap:6px; }
.g-next.card-2-enlarged .g-next-day { font-size:22px; padding-bottom:22px; }
.g-next.card-2-enlarged .g-next-name-row { flex-direction:column; gap:6px; }
.g-next.card-2-enlarged .g-next-name { font-size:40px; }
.g-next.card-2-enlarged .g-next-name.name-ch5 { font-size:34px; }
.g-next.card-2-enlarged .g-next-name.name-ch6 { font-size:28px; }
.g-next.card-2-enlarged .g-next-note { font-size:18px; margin-top:4px; }

 
.next-row.row-2 { display:grid; grid-template-columns:1fr 1fr; grid-template-rows:auto auto auto auto; column-gap:10px; row-gap:0; align-content:center; }
.next-row.row-2 .g-next { display:grid; grid-template-rows:subgrid; grid-row:span 4; justify-items:center; align-items:center; row-gap:0; }
.g-next.card-2-normal .g-next-note, .g-next.card-2-enlarged .g-next-note { margin-top:0; }

 
.g-today.today-full .g-today-icon, .g-next .g-next-icon { display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; }
.g-today.today-full .g-today-icon { width:64px; height:64px; color:#fff; }
.g-next.card-1-normal .g-next-icon { width:56px; height:56px; }
.g-next.card-1-enlarged .g-next-icon { width:60px; height:60px; }
.g-next.card-2-normal .g-next-icon { width:40px; height:40px; }
.g-next.card-2-enlarged .g-next-icon { width:56px; height:56px; }
.hourly { height:180px; display:flex; }
.h-cell { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; border-right:2px solid var(--c-line); padding:4px 0; }

.h-temp { font-family:'Share Tech Mono',monospace; text-align:center; line-height:1; }
.h-temp-num { font-size:36px; font-weight:500; color:var(--c-fg); }
.h-temp-deg { font-size:22px; color:var(--c-mute); vertical-align:0.55em; margin-left:1px; }
.hourly-error { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; }

.hourly-error-detail { font-family:'Share Tech Mono',monospace; font-size:36px; color:var(--c-sub); }
